apiVersion: v1alpha1
kind: Setting
metadata:
  name: comment-ai-autopilot-settings
spec:
  forms:
    - group: basic
      label: 基本设置
      formSchema:
        - $formkit: switch
          name: autoReply
          label: 自动回复
          value: true
        - $formkit: switch
          name: autoPublish
          label: 自动发布
          value: true
        - $formkit: number
          name: maxRetryCount
          label: 最大重试次数
          value: 3
          min: 1
          max: 10
        - $formkit: number
          name: maxConversationRounds
          label: 最大对话轮次
          help: 同一评论线程中AI最多自动回复的轮次，超过后不再回复
          value: 8
          min: 1
          max: 100
        - $formkit: number
          name: rateLimitPerMinute
          label: 速率限制
          help: 每分钟最大AI回复数量，防止批量评论消耗过多额度
          value: 10
          min: 1
          max: 100
        - $formkit: textarea
          name: blockedCommenters
          label: 评论者黑名单
          help: "输入评论者显示名称或邮箱，多个用逗号分隔。支持正则表达式，以 regex: 开头，如 regex:^spam.*"
          value: ""
        - $formkit: switch
          name: preFilterEnabled
          label: 启用前置过滤
          help: "AI回复前检测评论合规性，拦截广告/辱骂/敏感内容，节省Token"
          value: true
        - $formkit: switch
          name: preFilterPendingOnViolation
          label: 违规评论设为待审核
          help: "检测到违规评论时自动取消通过，需人工审核"
          value: true
        - $formkit: switch
          name: momentsEnabled
          label: 瞬间评论区适配
          help: "为瞬间插件(Moments)的评论区启用AI自动回复，需安装并启用瞬间插件"
          value: true
    - group: model
      label: 模型设置
      formSchema:
        - $formkit: text
          name: modelName
          label: AI模型名称
          help: 留空使用AI Foundation默认模型，填写AiModel资源名称可指定模型
          value: ""
    - group: prompt
      label: 提示词设置
      formSchema:
        - $formkit: textarea
          name: customPromptTemplate
          label: 自定义提示词模板
          value: "{{persona_prompt}}\n\n{{safety_prompt}}\n\n{{language_requirement}}\n\n{{output_guidance}}\n\n{{sentiment_hint}}\n文章标题：{{post_title}}\n发布日期：{{post_date}}\n评论数：{{comment_count}}\n文章（仅供理解上下文，不要复述）：\n{{article}}\n\n{{conversation_history}}\n评论：\n{{comment}}"
        - $formkit: select
          name: enabledPresets
          label: 启用预设
          help: 选择要启用的提示词预设风格
          value: []
          multiple: true
          options:
            - label: 友好型
              value: friendly
            - label: 专业型
              value: professional
            - label: 幽默型
              value: humorous
            - label: 简洁型
              value: concise
    - group: cleanup
      label: 数据清理
      formSchema:
        - $formkit: switch
          name: cleanupEnabled
          label: 启用自动清理
          value: true
        - $formkit: number
          name: retentionDays
          label: 保留天数
          help: 超过此天数的AI回复记录将被自动清理
          value: 30
          min: 1
          max: 365

